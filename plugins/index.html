<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The AIOS — the marketplace</title>
<meta name="description" content="the-aios.org/plugins — plugins, credentials, and extensions from the AIOS ecosystem. Where vendors and coaches set up shop." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#0a0a0a; --s1:#141414; --ink:#fafafa; --ink-muted:#c4c4c4; --ink-subtle:#707070;
    --accent:#ff5d4d; --accent-soft:#ffb3a8; --accent-glow:rgba(255,93,77,.18); --hairline:#262626;
    --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --mono:"JetBrains Mono","SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--canvas);color:var(--ink);font-family:var(--font);
    -webkit-font-smoothing:antialiased;font-feature-settings:"cv11","ss01","ss03";overflow:hidden}
  .hero{position:relative;min-height:100svh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:32px;overflow:hidden}
  .glow{position:absolute;inset:0;pointer-events:none;background:
    radial-gradient(55% 45% at 50% 40%,var(--accent-glow),transparent 70%),
    radial-gradient(45% 40% at 18% 88%,rgba(255,93,77,.07),transparent 70%)}
  .trail{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.45}
  .trail path{fill:none;stroke:var(--accent);stroke-width:1.3;stroke-dasharray:5 9;opacity:.5;
    animation:flow 26s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-260}}
  .ant{position:absolute;width:22px;height:22px;offset-rotate:auto;filter:drop-shadow(0 0 5px var(--accent-glow))}
  .ant svg{width:100%;height:100%;display:block}
  .a1{offset-path:path("M 1260 640 C 940 560, 820 360, 540 360 S 160 180, -60 110");animation:walk 25s linear infinite}
  .a2{offset-path:path("M 1260 640 C 940 560, 820 360, 540 360 S 160 180, -60 110");animation:walk 25s linear infinite;animation-delay:-9s;opacity:.7}
  @keyframes walk{from{offset-distance:0%}to{offset-distance:100%}}

  .inner{position:relative;z-index:2;max-width:760px}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;width:178px;margin:0 auto 34px}
  .tiles i{aspect-ratio:1;border:1px solid var(--hairline);border-radius:7px;background:var(--s1);
    transform:scale(.5);opacity:0;animation:pop .55s cubic-bezier(.2,.9,.3,1.4) forwards}
  .tiles i.on{border-color:rgba(255,93,77,.55);background:rgba(255,93,77,.12)}
  .tiles i:nth-child(1){animation-delay:.15s}.tiles i:nth-child(2){animation-delay:.25s}
  .tiles i:nth-child(3){animation-delay:.35s}.tiles i:nth-child(4){animation-delay:.45s}
  .tiles i:nth-child(5){animation-delay:.30s}.tiles i:nth-child(6){animation-delay:.40s}
  .tiles i:nth-child(7){animation-delay:.50s}.tiles i:nth-child(8){animation-delay:.60s}
  @keyframes pop{to{transform:scale(1);opacity:1}}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--accent);margin-bottom:24px;opacity:0;animation:rise .8s .55s cubic-bezier(.2,.7,.2,1) forwards}
  h1{font-size:clamp(38px,6.4vw,72px);font-weight:800;line-height:1.04;letter-spacing:-.03em;
    opacity:0;animation:rise .9s .68s cubic-bezier(.2,.7,.2,1) forwards}
  .sub{margin:26px auto 0;max-width:54ch;font-size:clamp(16px,2vw,18px);line-height:1.55;
    color:var(--ink-muted);opacity:0;animation:rise .9s .82s cubic-bezier(.2,.7,.2,1) forwards}
  .chip{display:inline-flex;align-items:center;gap:9px;margin-top:38px;padding:9px 18px;
    border:1px solid var(--hairline);border-radius:999px;font-family:var(--mono);font-size:12px;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);
    opacity:0;animation:rise .9s .96s cubic-bezier(.2,.7,.2,1) forwards}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);
    animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,93,77,.5)}50%{box-shadow:0 0 0 7px rgba(255,93,77,0)}}
  @keyframes rise{to{opacity:1;transform:none}}
  .eyebrow,h1,.sub,.chip{transform:translateY(20px)}
  .foot{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-family:var(--mono);
    font-size:11px;letter-spacing:.06em;color:var(--ink-subtle);z-index:2}
  .foot a{color:var(--ink-subtle);text-decoration:none;transition:color .2s}
  .foot a:hover{color:var(--accent)}
  .accent{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}.eyebrow,h1,.sub,.chip{opacity:1;transform:none}.tiles i{opacity:1;transform:none}}
</style>
</head>
<body>
<main class="hero">
  <div class="glow"></div>
  <svg class="trail" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <path d="M 1260 640 C 940 560, 820 360, 540 360 S 160 180, -60 110" />
  </svg>
  <div class="ant a1"><svg viewBox="0 0 40 40"><g fill="#ff5d4d"><ellipse cx="11" cy="20" rx="5" ry="4"/><ellipse cx="20" cy="20" rx="4" ry="3.2"/><ellipse cx="29" cy="20" rx="6" ry="5"/><g stroke="#ff5d4d" stroke-width="1.4" stroke-linecap="round"><path d="M14 20 L8 13"/><path d="M14 20 L7 20"/><path d="M14 20 L8 27"/><path d="M22 20 L28 13"/><path d="M22 20 L29 20"/><path d="M22 20 L28 27"/><path d="M33 18 L38 13"/><path d="M33 22 L38 27"/></g></g></svg></div>
  <div class="ant a2"><svg viewBox="0 0 40 40"><g fill="#ff5d4d"><ellipse cx="11" cy="20" rx="5" ry="4"/><ellipse cx="20" cy="20" rx="4" ry="3.2"/><ellipse cx="29" cy="20" rx="6" ry="5"/><g stroke="#ff5d4d" stroke-width="1.4" stroke-linecap="round"><path d="M14 20 L8 13"/><path d="M14 20 L7 20"/><path d="M14 20 L8 27"/><path d="M22 20 L28 13"/><path d="M22 20 L29 20"/><path d="M22 20 L28 27"/><path d="M33 18 L38 13"/><path d="M33 22 L38 27"/></g></g></svg></div>

  <div class="inner">
    <div class="tiles" aria-hidden="true"><i></i><i class="on"></i><i></i><i></i><i></i><i></i><i class="on"></i><i></i></div>
    <div class="eyebrow">The AIOS · marketplace</div>
    <h1>The shelves are<br>being stocked.</h1>
    <p class="sub">Plugins, credentials, and extensions from the AIOS ecosystem — where <span class="accent">vendors and coaches</span> set up shop. The first shelves are going up.</p>
    <div class="chip"><span class="dot"></span>Opening soon</div>
  </div>

  <div class="foot">the-aios.org/plugins · the marketplace &nbsp;·&nbsp; <a href="https://the-aios.com">the-aios.com →</a></div>
</main>
</body>
</html>
